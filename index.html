<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal's Headquarter — World Watch, Military & Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400..900&family=Inter:opsz@14..32&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0b1a2e;
      --red: #b22234;
      --cream: #f5efe6;
      --paper: #fcf9f5;
      --slate: #4a5568;
      --rule: #ddd0c0;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      padding: 0 1rem;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    img {
      max-width: 100%;
      display: block;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ---- MASTHEAD ---- */
    .masthead {
      background: var(--paper);
      border-bottom: 4px solid var(--ink);
      padding: 1rem 1rem 0.5rem;
      text-align: center;
    }
    .masthead h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .masthead h1 .the {
      font-size: 0.3em;
      display: block;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--slate);
    }
    .masthead .tagline {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate);
      margin-top: 0.3rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-family: var(--mono);
      color: var(--slate);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
      flex-wrap: wrap;
      gap: 8px;
    }
    .lock-btn {
      background: none;
      border: 1px solid var(--rule);
      padding: 4px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
    }
    .lock-btn:hover {
      border-color: var(--ink);
    }

    /* ---- TRANSLATE ---- */
    .translate-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      background: var(--cream);
      padding: 6px 16px;
      border-bottom: 1px solid var(--rule);
      font-size: 0.75rem;
      flex-wrap: wrap;
    }
    .goog-te-combo {
      padding: 4px 8px;
      border: 1px solid var(--rule);
      border-radius: 4px;
      background: white;
      font-size: 0.8rem;
    }
    .skiptranslate {
      display: none !important;
    }
    body {
      top: 0 !important;
    }

    /* ---- SUPPORT BAR ---- */
    .support-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      background: #fcf3dc;
      padding: 8px 16px;
      border-top: 1px solid #e6c78a;
      border-bottom: 1px solid #e6c78a;
      font-weight: 700;
      font-size: 0.8rem;
      color: #7a5b12;
      cursor: pointer;
      width: 100%;
    }
    .support-bar svg {
      width: 16px;
      height: 16px;
    }

    /* ---- NAV ---- */
    .main-nav {
      background: var(--ink);
    }
    .nav-inner {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      padding: 0 12px;
    }
    .nav-inner a {
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #cdd6e4;
      padding: 10px 14px;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .nav-inner a:hover,
    .nav-inner a.active {
      color: #fff;
      border-bottom-color: var(--red);
      background: #1d2f4c;
    }

    /* ---- TICKER ---- */
    .ticker-wrap {
      background: var(--red);
      color: #fff;
      display: flex;
      overflow: hidden;
      border-bottom: 2px solid #7a1a1a;
    }
    .ticker-label {
      background: #7a1a1a;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.65rem;
      padding: 6px 14px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.08em;
    }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: scroll 28s linear infinite;
      padding: 6px 0;
    }
    .ticker-track span {
      padding: 0 28px;
      border-right: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
    }
    @keyframes scroll {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    /* ---- MAIN ---- */
    main {
      padding: 2rem 0 3rem;
    }
    .page-title {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 800;
      border-bottom: 3px solid var(--ink);
      padding-bottom: 8px;
      margin-bottom: 1.5rem;
    }

    /* ---- LEAD STORY ---- */
    .lead {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2rem;
      margin-bottom: 2rem;
    }
    .lead.no-img {
      grid-template-columns: 1fr;
      max-width: 760px;
    }
    .lead img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: #ddd;
      border: 1px solid var(--rule);
    }
    .lead .caption {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--slate);
      margin-top: 4px;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .breaking-badge {
      background: var(--red);
      color: #fff;
      padding: 2px 8px;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
    }
    .lead h2 {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      line-height: 1.08;
      margin-bottom: 10px;
    }
    .lead h2 a:hover {
      text-decoration: underline;
    }
    .deck {
      font-size: 1.05rem;
      color: #2b3950;
      margin-bottom: 10px;
    }
    .byline {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--slate);
    }
    .byline b {
      color: var(--ink);
    }

    /* ---- STORY ROW ---- */
    .story-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 18px;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .story-row:first-child {
      padding-top: 0;
    }
    .story-row .thumb {
      width: 140px;
      height: 100px;
      object-fit: cover;
      background: #ddd;
      border: 1px solid var(--rule);
    }
    .story-row h3 {
      font-family: var(--serif);
      font-size: 1.25rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .story-row h3 a:hover {
      text-decoration: underline;
    }
    .story-row .deck {
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #3a4660;
    }
    .story-row.no-img {
      grid-template-columns: 1fr;
    }

    /* ---- RAIL ---- */
    .rail-wrap {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 36px;
      margin-top: 10px;
    }
    .rail {
      border-left: 1px solid var(--rule);
      padding-left: 24px;
    }
    .rail h4 {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }
    .rail-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
    }
    .rail-item:first-child {
      padding-top: 0;
    }
    .rail-item a {
      font-family: var(--serif);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .rail-item a:hover {
      text-decoration: underline;
    }
    .rail-item .meta {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--slate);
      margin-top: 3px;
    }

    /* ---- ARTICLE PAGE ---- */
    .article-back {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      border: 1px solid var(--rule);
      padding: 5px 12px;
      margin-bottom: 1.5rem;
      color: var(--slate);
    }
    .article-back:hover {
      border-color: var(--ink);
      color: var(--ink);
    }
    .article-head {
      max-width: 760px;
      margin: 0 auto 1.5rem;
    }
    .article-head h1 {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.08;
      margin-bottom: 10px;
    }
    .article-head .deck {
      font-size: 1.15rem;
    }
    .article-meta {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--slate);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 8px 0;
    }
    .article-figure {
      max-width: 820px;
      margin: 0 auto 1.5rem;
    }
    .article-figure img {
      border: 1px solid var(--rule);
    }
    .article-figure figcaption {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--slate);
      margin-top: 4px;
    }
    .article-body {
      max-width: 680px;
      margin: 0 auto;
      font-family: var(--serif);
      font-size: 1.15rem;
      line-height: 1.7;
      color: #1b2840;
    }
    .article-body p {
      margin-bottom: 1.2rem;
    }
    .article-body p:first-of-type::first-letter {
      font-size: 3.2em;
      float: left;
      line-height: 0.85;
      padding-right: 8px;
      padding-top: 4px;
      font-weight: 800;
      color: var(--ink);
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      max-width: 680px;
      margin: 1.2rem auto 0;
    }
    .tag-chip {
      font-family: var(--mono);
      font-size: 0.7rem;
      background: var(--cream);
      border: 1px solid var(--rule);
      padding: 3px 10px;
      text-transform: lowercase;
    }
    .tag-chip::before {
      content: "#";
      color: var(--red);
    }
    .tag-chip:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .tag-chip:hover::before {
      color: #fff;
    }

    /* ---- FOOTER ---- */
    footer {
      background: var(--ink);
      color: #cdd6e4;
      margin-top: 2rem;
      padding: 2rem 1rem 1rem;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-grid h5 {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8fa0c4;
      margin-bottom: 10px;
    }
    .footer-brand {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .footer-grid p {
      font-size: 0.85rem;
      color: #a9b3c6;
    }
    .footer-links a {
      display: block;
      font-size: 0.85rem;
      color: #cdd6e4;
      padding: 3px 0;
    }
    .footer-links a:hover {
      color: #fff;
      text-decoration: underline;
    }
    .footer-bottom {
      border-top: 1px solid #2a3c5c;
      padding-top: 1rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: #8194b5;
      max-width: 1200px;
      margin: 1.5rem auto 0;
    }

    /* ---- STATIC PAGES ---- */
    .static {
      max-width: 720px;
      margin: 0 auto;
    }
    .static h1 {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 800;
      border-bottom: 3px solid var(--ink);
      padding-bottom: 8px;
      margin-bottom: 6px;
    }
    .static .updated {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--slate);
      display: block;
      margin-bottom: 1.2rem;
    }
    .static h2 {
      font-family: var(--serif);
      font-size: 1.3rem;
      margin: 1.5rem 0 0.5rem;
    }
    .static p,
    .static li {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #1b2840;
    }
    .static ul {
      padding-left: 1.5rem;
    }

    /* ---- CONTACT ---- */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 1rem;
    }
    .contact-card {
      border: 1px solid var(--rule);
      padding: 1.2rem;
      background: var(--paper);
    }
    .contact-card h3 {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--slate);
      margin-bottom: 8px;
    }
    .contact-card .val {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .contact-card a.val-link {
      color: var(--red);
    }
    .form-field {
      margin-bottom: 12px;
    }
    .form-field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--slate);
      margin-bottom: 3px;
    }
    .form-field input,
    .form-field textarea {
      width: 100%;
      border: 1px solid var(--rule);
      padding: 8px 10px;
      font-size: 0.9rem;
      background: var(--paper);
      font-family: var(--sans);
    }
    .form-field textarea {
      min-height: 90px;
      resize: vertical;
    }
    .btn {
      display: inline-block;
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 8px 18px;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn:hover {
      background: #0c1932;
    }
    .btn.red {
      background: var(--red);
    }
    .btn.red:hover {
      background: #7a1a1a;
    }
    .btn.ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--rule);
    }
    .btn.ghost:hover {
      border-color: var(--ink);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--ink);
      color: #fff;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 0.85rem;
      border-left: 4px solid var(--red);
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      max-width: 320px;
    }

    /* ---- MODAL ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-box {
      background: var(--paper);
      max-width: 400px;
      width: 100%;
      padding: 1.5rem;
      border-top: 5px solid var(--red);
    }
    .modal-box h2 {
      font-family: var(--serif);
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .modal-box p {
      font-size: 0.9rem;
      color: var(--slate);
      margin-bottom: 1rem;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .modal-err {
      color: var(--red);
      font-size: 0.85rem;
      font-family: var(--mono);
      margin-top: 6px;
    }

    .support-modal {
      text-align: center;
      padding-top: 1rem;
    }
    .support-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--slate);
      cursor: pointer;
    }
    .support-qr {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border: 3px solid var(--paper);
      box-shadow: 0 0 0 1px var(--rule);
      border-radius: 4px;
      margin: 0 auto 12px;
    }
    .support-upi-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      background: var(--cream);
      border: 1px solid var(--rule);
      padding: 6px 12px;
      margin-bottom: 12px;
    }
    .support-upi-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--slate);
    }
    .support-upi-id {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .support-copy-btn {
      padding: 3px 10px;
      font-size: 0.7rem;
    }
    .support-copy {
      font-size: 0.85rem;
      color: var(--slate);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 1rem;
    }

    /* ---- ADMIN ---- */
    .admin-shell {
      max-width: 1180px;
    }
    .admin-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 3px solid var(--ink);
      padding-bottom: 12px;
      margin-bottom: 1.5rem;
    }
    .admin-bar h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
    }
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .admin-tabs button {
      background: transparent;
      border: 1px solid var(--rule);
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--slate);
      cursor: pointer;
    }
    .admin-tabs button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    fieldset {
      border: 1px solid var(--rule);
      padding: 14px;
      margin-bottom: 14px;
    }
    legend {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--slate);
      padding: 0 6px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .checkbox-row input {
      width: 16px;
      height: 16px;
    }
    .checkbox-row label {
      font-size: 0.9rem;
    }
    .checkbox-row.breaking label {
      color: var(--red);
      font-weight: 700;
    }
    .file-drop {
      border: 1.5px dashed var(--rule);
      padding: 14px;
      text-align: center;
      background: var(--cream);
      font-size: 0.85rem;
      color: var(--slate);
      position: relative;
      cursor: pointer;
    }
    .file-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-drop.has-file {
      border-color: #1e6b4f;
      background: #e9f4ee;
      color: #1e6b4f;
    }
    .img-preview {
      max-height: 120px;
      margin-top: 8px;
      border: 1px solid var(--rule);
    }
    .htmljournal-box {
      background: #eef3fa;
      border: 1px solid #c5d4ea;
      padding: 12px;
      margin-bottom: 14px;
    }
    .htmljournal-box p {
      font-size: 0.8rem;
      color: #324560;
      margin-bottom: 8px;
    }
    .article-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .article-table th {
      text-align: left;
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--slate);
      border-bottom: 2px solid var(--ink);
      padding: 6px 8px;
      cursor: pointer;
    }
    .article-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--rule);
    }
    .article-table tr:hover td {
      background: #fbf8ef;
    }
    .views-pill {
      font-family: var(--mono);
      font-weight: 700;
      background: var(--ink);
      color: #fff;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.75rem;
    }
    .views-pill.top {
      background: var(--red);
    }
    .row-actions {
      display: flex;
      gap: 4px;
    }
    .row-actions button {
      font-family: var(--mono);
      font-size: 0.65rem;
      border: 1px solid var(--rule);
      background: transparent;
      padding: 3px 8px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .row-actions button:hover {
      border-color: var(--ink);
    }
    .row-actions button.danger:hover {
      border-color: var(--red);
      color: var(--red);
    }
    .confirm-row td {
      background: #fff4f2 !important;
    }
    .confirm-inline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge-pill {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      background: var(--cream);
      padding: 2px 6px;
      border: 1px solid var(--rule);
    }
    .badge-pill.featured {
      background: #1758c91a;
      color: #1758c9;
      border-color: #1758c955;
    }
    .badge-pill.breaking {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }
    .empty-state {
      border: 1px dashed var(--rule);
      padding: 2rem 1rem;
      text-align: center;
      color: var(--slate);
      font-size: 1rem;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 820px) {
      .lead {
        grid-template-columns: 1fr;
      }
      .rail-wrap {
        grid-template-columns: 1fr;
      }
      .rail {
        border-left: none;
        border-top: 1px solid var(--rule);
        padding-left: 0;
        padding-top: 1.2rem;
      }
      .footer-grid {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .contact-grid {
        grid-template-columns: 1fr;
      }
      .admin-grid {
        grid-template-columns: 1fr;
      }
      .story-row {
        grid-template-columns: 1fr;
      }
      .story-row .thumb {
        width: 100%;
        height: 160px;
        order: -1;
      }
    }
  </style>
</head>
<body>

  <!-- ===== APP ROOT ===== -->
  <div id="app"></div>
  <div id="modalRoot"></div>

  <script>
    // ==========================================================
    // CONFIG
    // ==========================================================
    const CONFIG = {
      ADMIN_PW: "solojournal2026",
      FORMSPREE_URL: "https://formspree.io/f/xeebkkyp",
      UPI_ID: "6393079532@fam",
      PHONE: "+91 6393079532",
      EMAIL: "theonejournal2026@gmail.com",
      YT_NAME: "ADI GEOSPACE",
      YT_URL: "https://www.youtube.com/@Adigeospace",
      QR_IMAGE: "upi-qr.jpeg",  // <-- FIXED: now supports .jpeg
      SUPABASE_URL: "https://dsaifutdyvbczzwmsbdo.supabase.co",
      SUPABASE_KEY: "sb_publishable_ljFRr85nhwfv0kunVEZSig_Ckcbvy65",
    };

    const SECTIONS = ["World Watch", "Regional Watch", "Military & Tech Watch", "HTML Journal"];

    // ==========================================================
    // SUPABASE HELPERS
    // ==========================================================
    const SB_HEADERS = {
      apikey: CONFIG.SUPABASE_KEY,
      Authorization: `Bearer ${CONFIG.SUPABASE_KEY}`,
      "Content-Type": "application/json",
    };

    async function loadArticles() {
      try {
        const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?select=*&order=timestamp.desc`, {
          headers: SB_HEADERS,
        });
        if (!res.ok) throw new Error("Failed to load");
        const data = await res.json();
        return data.map(row => ({
          id: row.id,
          section: row.section,
          headline: row.headline,
          deck: row.deck || "",
          byline: row.byline,
          body: row.body,
          image: row.image,
          caption: row.caption || "",
          breaking: row.breaking || false,
          featured: row.featured || false,
          tags: row.tags || "",
          timestamp: row.timestamp,
          views: row.views || 0
        }));
      } catch (e) {
        console.error("Load error", e);
        showToast("Could not load articles. Check Supabase connection.");
        return [];
      }
    }

    async function insertArticle(article) {
      try {
        const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles`, {
          method: "POST",
          headers: { ...SB_HEADERS, Prefer: "return=minimal" },
          body: JSON.stringify([article]),
        });
        return res.ok;
      } catch (e) {
        console.error("Insert error", e);
        return false;
      }
    }

    async function updateArticleRemote(id, fields) {
      try {
        const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
          method: "PATCH",
          headers: { ...SB_HEADERS, Prefer: "return=minimal" },
          body: JSON.stringify(fields),
        });
        return res.ok;
      } catch (e) {
        console.error("Update error", e);
        return false;
      }
    }

    async function deleteArticleRemote(id) {
      try {
        const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
          method: "DELETE",
          headers: SB_HEADERS,
        });
        return res.ok;
      } catch (e) {
        console.error("Delete error", e);
        return false;
      }
    }

    async function incrementView(id) {
      const article = state.articles.find(a => a.id === id);
      if (!article) return;
      const newCount = (article.views || 0) + 1;
      article.views = newCount;
      try {
        await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
          method: "PATCH",
          headers: { ...SB_HEADERS, Prefer: "return=minimal" },
          body: JSON.stringify({ views: newCount }),
        });
      } catch (e) { console.error("View increment error", e); }
    }

    // ==========================================================
    // STATE
    // ==========================================================
    let state = {
      articles: [],
      route: window.location.hash.replace(/^#\/?/, "") || "",
      loading: true,
    };

    function isAdmin() { return sessionStorage.getItem("journal_admin") === "1"; }

    function setAdmin(val) { sessionStorage.setItem("journal_admin", val ? "1" : "0"); }

    // ==========================================================
    // UTILITY
    // ==========================================================
    function uid() { return "a" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(
        /'/g, "&#39;");
    }

    function nl2paragraphs(body) {
      return body.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean).map(p => `<p>${escapeHtml(p).replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function relativeTime(ts) {
      const diff = Date.now() - ts;
      const min = Math.floor(diff / 60000);
      if (min < 1) return "just now";
      if (min < 60) return min + "m ago";
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + "h ago";
      const days = Math.floor(hr / 24);
      if (days < 7) return days + "d ago";
      return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function fullDate(ts) {
      return new Date(ts).toLocaleString(undefined, { weekday: "short", year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit" });
    }

    function slugify(str) { return str.toLowerCase().replace(/\s+/g, "-"); }

    function parseTags(str) { if (!str) return []; return str.split(",").map(t => t.trim()).filter(Boolean); }

    function tagSlug(tag) { return tag.toLowerCase().trim().replace(/\s+/g, "-"); }

    function getArticlesBySection(section) { return state.articles.filter(a => a.section === section).sort((a, b) => b
        .timestamp - a.timestamp); }

    function getAllSorted() { return [...state.articles].sort((a, b) => b.timestamp - a.timestamp); }

    function getLeadStory() {
      const featured = state.articles.filter(a => a.featured).sort((a, b) => b.timestamp - a.timestamp);
      if (featured.length) return featured[0];
      return getAllSorted()[0] || null;
    }

    function findArticle(id) { return state.articles.find(a => a.id === id); }

    function getArticlesByTag(tagSlug) {
      return state.articles.filter(a => parseTags(a.tags).some(t => tagSlug(t) === tagSlug)).sort((a, b) => b.timestamp - a
        .timestamp);
    }

    function slugToSection(slug) { return SECTIONS.find(s => slugify(s) === slug); }

    function showToast(msg) {
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }

    // ==========================================================
    // RENDER SHELL
    // ==========================================================
    function renderShell(innerHtml) {
      const today = new Date().toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
      const tickerItems = getAllSorted().slice(0, 8);
      const tickerHtml = tickerItems.length ?
        tickerItems.map(a =>
          `<span>${a.breaking ? "BREAKING — " : ""}${escapeHtml(a.headline)}</span>`).join("") :
        `<span>Welcome to Journal's Headquarter — your stories will appear here once published.</span>`;

      const route = state.route;
      const navActive = (key) => (route === key ? "active" : "");

      return `
      <div class="masthead">
        <div class="top-bar">
          <span>${escapeHtml(today)}</span>
          <button class="lock-btn" id="lockBtn">🔒 Control Panel</button>
        </div>
        <a href="#/" style="display:inline-block;">
          <h1><span class="the">The</span>Journal's Headquarter</h1>
        </a>
        <div class="tagline">World Watch · Regional Watch · Military &amp; Tech Watch</div>
      </div>

      <div class="translate-wrap">
        <span>🌐 Translate:</span>
        <div id="google_translate_element"></div>
      </div>

      <button class="support-bar" id="supportBarBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Support Independent Journalism</span>
      </button>

      <nav class="main-nav">
        <div class="nav-inner">
          <a href="#/" class="${navActive("")}">Front Page</a>
          <a href="#/section/world-watch" class="${route === "section/world-watch" ? "active" : ""}">World Watch</a>
          <a href="#/section/regional-watch" class="${route === "section/regional-watch" ? "active" : ""}">Regional Watch</a>
          <a href="#/section/military-tech-watch" class="${route === "section/military-tech-watch" ? "active" : ""}">Military &amp; Tech Watch</a>
          <a href="#/section/html-journal" class="${route === "section/html-journal" ? "active" : ""}">HTML Journal</a>
        </div>
      </nav>

      <div class="ticker-wrap">
        <div class="ticker-label">Latest</div>
        <div class="ticker-track">${tickerHtml}${tickerHtml}</div>
      </div>

      <main class="container">${innerHtml}</main>
      ${renderFooter()}
    `;
    }

    function renderFooter() {
      return `
      <footer>
        <div class="footer-grid">
          <div>
            <div class="footer-brand">Journal's Headquarter</div>
            <p>Independent daily reporting on World Watch, Regional Watch, and Military &amp; Tech — clear, timely, and to the point.</p>
          </div>
          <div>
            <h5>Sections</h5>
            <div class="footer-links">
              <a href="#/section/world-watch">World Watch</a>
              <a href="#/section/regional-watch">Regional Watch</a>
              <a href="#/section/military-tech-watch">Military &amp; Tech Watch</a>
              <a href="#/section/html-journal">HTML Journal</a>
            </div>
          </div>
          <div>
            <h5>Site</h5>
            <div class="footer-links">
              <a href="#/about">About Us</a>
              <a href="#/contact">Contact Us</a>
              <a href="#/privacy">Privacy Policy</a>
              <a href="#/terms">Terms of Service</a>
              <a href="#/disclaimer">Disclaimer</a>
            </div>
          </div>
        </div>
        <div class="footer-bottom">© ${new Date().getFullYear()} Journal's Headquarter. All rights reserved.</div>
      </footer>
    `;
    }

    // ==========================================================
    // PAGE RENDERERS
    // ==========================================================
    function renderFrontPage() {
      const all = getAllSorted();
      if (!all.length) {
        return `<div class="empty-state">No articles published yet. Open the control panel to publish your first story.</div>`;
      }
      const lead = getLeadStory();
      const rest = all.filter(a => a.id !== lead.id).slice(0, 8);

      const leadHtml = `
      <div class="lead${lead.image ? "" : " no-img"}">
        ${lead.image ? `<div><img src="${lead.image}" alt="${escapeHtml(lead.headline)}">${lead.caption ? `<div class="caption">${escapeHtml(lead.caption)}</div>` : ""}</div>` : ""}
        <div>
          <div class="eyebrow">${lead.breaking ? `<span class="breaking-badge">Breaking</span>` : ""}<span>${escapeHtml(lead.section)}</span></div>
          <h2><a href="#/article/${lead.id}">${escapeHtml(lead.headline)}</a></h2>
          <p class="deck">${escapeHtml(lead.deck)}</p>
          <div class="byline">By <b>${escapeHtml(lead.byline)}</b> · ${relativeTime(lead.timestamp)}</div>
        </div>
      </div>
    `;

      const listHtml = rest.map(a => `
      <div class="story-row ${a.image ? "" : "no-img"}">
        <div>
          <div class="eyebrow">${a.breaking ? `<span class="breaking-badge">Breaking</span>` : ""}<span>${escapeHtml(a.section)}</span></div>
          <h3><a href="#/article/${a.id}">${escapeHtml(a.headline)}</a></h3>
          <p class="deck">${escapeHtml(a.deck)}</p>
          <div class="byline">By <b>${escapeHtml(a.byline)}</b> · ${relativeTime(a.timestamp)}</div>
        </div>
        ${a.image ? `<img class="thumb" src="${a.image}" alt="">` : ""}
      </div>
    `).join("");

      return `
      ${leadHtml}
      <div class="rail-wrap">
        <div>${listHtml}</div>
        <div class="rail">
          ${renderRail("World Watch")}
          ${renderRail("Regional Watch")}
          ${renderRail("Military & Tech Watch")}
        </div>
      </div>
    `;
    }

    function renderRail(section) {
      const items = getArticlesBySection(section).slice(0, 4);
      if (!items.length) return "";
      return `
      <h4>${escapeHtml(section)}</h4>
      ${items.map(a => `
        <div class="rail-item">
          <a href="#/article/${a.id}">${escapeHtml(a.headline)}</a>
          <div class="meta">${a.breaking ? "BREAKING · " : ""}${relativeTime(a.timestamp)}</div>
        </div>
      `).join("")}
    `;
    }

    function renderSectionPage(slug) {
      const section = slugToSection(slug);
      if (!section) return `<div class="empty-state">Section not found.</div>`;
      const items = getArticlesBySection(section);
      document.title = `${section} — Journal's Headquarter`;
      if (!items.length) return `<h1 class="page-title">${escapeHtml(section)}</h1><div class="empty-state">No ${escapeHtml(section)} articles yet. Check back soon.</div>`;
      return `
      <h1 class="page-title">${escapeHtml(section)}</h1>
      ${items.map(a => `
        <div class="story-row ${a.image ? "" : "no-img"}">
          <div>
            <div class="eyebrow">${a.breaking ? `<span class="breaking-badge">Breaking</span>` : ""}<span>${escapeHtml(a.section)}</span></div>
            <h3><a href="#/article/${a.id}">${escapeHtml(a.headline)}</a></h3>
            <p class="deck">${escapeHtml(a.deck)}</p>
            <div class="byline">By <b>${escapeHtml(a.byline)}</b> · ${relativeTime(a.timestamp)}</div>
          </div>
          ${a.image ? `<img class="thumb" src="${a.image}" alt="">` : ""}
        </div>
      `).join("")}
    `;
    }

    function renderTagPage(slug) {
      const items = getArticlesByTag(slug);
      const displayName = items.length ? parseTags(items[0].tags).find(t => tagSlug(t) === slug) : slug.replace(/-/g, " ");
      document.title = `${displayName} — Tagged — Journal's Headquarter`;
      if (!items.length) return `<h1 class="page-title">Tag: ${escapeHtml(displayName)}</h1><div class="empty-state">No articles found with this tag yet.</div>`;
      return `
      <h1 class="page-title">Tag: ${escapeHtml(displayName)}</h1>
      ${items.map(a => `
        <div class="story-row ${a.image ? "" : "no-img"}">
          <div>
            <div class="eyebrow">${a.breaking ? `<span class="breaking-badge">Breaking</span>` : ""}<span>${escapeHtml(a.section)}</span></div>
            <h3><a href="#/article/${a.id}">${escapeHtml(a.headline)}</a></h3>
            <p class="deck">${escapeHtml(a.deck)}</p>
            <div class="byline">By <b>${escapeHtml(a.byline)}</b> · ${relativeTime(a.timestamp)}</div>
          </div>
          ${a.image ? `<img class="thumb" src="${a.image}" alt="">` : ""}
        </div>
      `).join("")}
    `;
    }

    let viewedThisSession = new Set();

    function renderArticlePage(id) {
      const article = findArticle(id);
      if (!article) return `<div class="empty-state">Article not found. <br><br><a href="#/" class="btn ghost" style="margin-top:10px;display:inline-block;">Back to Front Page</a></div>`;
      document.title = `${article.headline} — Journal's Headquarter`;
      if (!viewedThisSession.has(id)) { incrementView(id);
        viewedThisSession.add(id); }
      const views = article.views || 0;
      const tags = parseTags(article.tags);
      return `
      <a href="#/" class="article-back">&larr; Back</a>
      <div class="article-head">
        <div class="eyebrow">${article.breaking ? `<span class="breaking-badge">Breaking</span>` : ""}<span>${escapeHtml(article.section)}</span></div>
        <h1>${escapeHtml(article.headline)}</h1>
        <p class="deck">${escapeHtml(article.deck)}</p>
        <div class="article-meta">
          <span>By <b>${escapeHtml(article.byline)}</b></span>
          <span>${fullDate(article.timestamp)}</span>
          <span>${views} views</span>
        </div>
      </div>
      ${article.image ? `<figure class="article-figure"><img src="${article.image}" alt="${escapeHtml(article.headline)}">${article.caption ? `<figcaption>${escapeHtml(article.caption)}</figcaption>` : ""}</figure>` : ""}
      <div class="article-body">${nl2paragraphs(article.body)}</div>
      ${tags.length ? `<div class="tag-row">${tags.map(t => `<a href="#/tag/${tagSlug(t)}" class="tag-chip">${escapeHtml(t)}</a>`).join("")}</div>` : ""}
      <div style="max-width:680px;margin:2rem auto 0;"><a href="#/" class="article-back">&larr; Back to Front Page</a></div>
    `;
    }

    // ==========================================================
    // STATIC PAGES
    // ==========================================================
    function renderAboutPage() {
      document.title = "About Us — Journal's Headquarter";
      return `
      <div class="static">
        <h1>About Us</h1>
        <span class="updated">Journal's Headquarter</span>
        <p><strong>Journal's Headquarter</strong> is an independent digital publication delivering daily news and analysis across World Watch, Regional Watch, and Military &amp; Tech Watch. Our mission is simple: to bring readers clear, timely, and trustworthy reporting in a fast-changing world.</p>
        <p>Inspired by the strategic clarity of a military headquarters, we focus on what matters — cutting through the noise to deliver accurate, well-structured, and easy-to-follow journalism.</p>
        <p>Whether it's a geopolitical shift, regional tension, or breakthrough in military tech, our goal is to keep you informed without the fluff.</p>
        <h2>Follow Along</h2>
        <p>Video coverage and behind-the-scenes updates are shared on our <a href="${CONFIG.YT_URL}" target="_blank" rel="noopener noreferrer" style="color:var(--red);">${CONFIG.YT_NAME}</a> YouTube channel.</p>
      </div>
    `;
    }

    function renderPrivacyPage() {
      document.title = "Privacy Policy — Journal's Headquarter";
      return `
      <div class="static">
        <h1>Privacy Policy</h1>
        <span class="updated">Last updated: ${new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })}</span>
        <p>This Privacy Policy explains how Journal's Headquarter ("we," "us," or "our") collects, uses, and protects information when you visit our website. By using this site, you agree to the terms described below.</p>
        <h2>1. Information We Collect</h2>
        <p>We may collect limited information automatically when you visit our site, including your IP address, browser type, device type, pages viewed, and time spent on the site. If you use our contact form, we collect the name, email address, and message you voluntarily provide.</p>
        <h2>2. Cookies</h2>
        <p>Our site may use cookies and similar tracking technologies to improve your browsing experience, remember preferences, and analyze site traffic. You can disable cookies through your browser settings, though some features of the site may not function properly without them.</p>
        <h2>3. Third-Party Advertising</h2>
        <p>We may use third-party advertising companies, such as Google AdSense, to serve ads when you visit our site. These companies may use cookies and similar technologies to collect information about your visits to this and other websites in order to provide advertisements about goods and services of interest to you. Google's use of advertising cookies enables it and its partners to serve ads based on your visits to this site and/or other sites on the Internet.</p>
        <p>You may opt out of personalized advertising by visiting Google's Ads Settings, and you can learn more about how Google uses data at Google's Privacy &amp; Terms page.</p>
        <h2>4. How We Use Information</h2>
        <ul><li>To operate, maintain, and improve our website</li><li>To respond to inquiries submitted through our contact form</li><li>To analyze site traffic and reader engagement</li><li>To display relevant advertising through third-party partners</li></ul>
        <h2>5. Data Sharing</h2>
        <p>We do not sell your personal information. We may share limited data with service providers (such as analytics or advertising partners) strictly to operate and monetize the site, in accordance with their own privacy policies.</p>
        <h2>6. Data Security</h2>
        <p>We take reasonable measures to protect information collected through this site. However, no method of transmission over the internet is completely secure, and we cannot guarantee absolute security.</p>
        <h2>7. Children's Privacy</h2>
        <p>This site is not directed at children under 13, and we do not knowingly collect personal information from children.</p>
        <h2>8. Changes to This Policy</h2>
        <p>We may update this Privacy Policy from time to time. Changes will be posted on this page with an updated revision date.</p>
        <h2>9. Contact Us</h2>
        <p>If you have questions about this Privacy Policy or how your information is handled, please contact us at <a href="mailto:${CONFIG.EMAIL}" style="color:var(--red);">${CONFIG.EMAIL}</a>.</p>
      </div>
    `;
    }

    function renderTermsPage() {
      document.title = "Terms of Service — Journal's Headquarter";
      return `
      <div class="static">
        <h1>Terms of Service</h1>
        <span class="updated">Last updated: ${new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })}</span>

    function renderManageTable() {
      if (!state.articles.length) return `<div class="empty-state">No articles yet. Publish your first one from the "Publish New Article" tab.</div>`;
      let rows = state.articles.map(a => ({ ...a, views: a.views || 0 }));
      rows.sort((a, b) => {
        let av = a[sortKey],
          bv = b[sortKey];
        if (typeof av === "string") { av = av.toLowerCase();
          bv = bv.toLowerCase(); }
        if (av < bv) return sortDir === "asc" ? -1 : 1;
        if (av > bv) return sortDir === "asc" ? 1 : -1;
        return 0;
      });
      const maxViews = Math.max(...rows.map(r => r.views), 0);
      return `
      <div style="overflow-x:auto;">
      <table class="article-table">
        <thead><tr>
          <th class="${sortKey === "headline" ? "sorted" : ""}" data-sort="headline">Headline</th>
          <th class="${sortKey === "section" ? "sorted" : ""}" data-sort="section">Section</th>
          <th class="${sortKey === "timestamp" ? "sorted" : ""}" data-sort="timestamp">Published</th>
          <th class="${sortKey === "views" ? "sorted" : ""}" data-sort="views">Views</th>
          <th>Flags</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${rows.map(a => {
          const isTop = a.views === maxViews && maxViews > 0;
          if (pendingDeleteId === a.id) return `<tr class="confirm-row"><td colspan="6"><div class="confirm-inline">Delete "<b>${escapeHtml(a.headline)}</b>" permanently? <button class="btn red" data-action="confirm-delete" data-id="${a.id}">Yes</button><button class="btn ghost" data-action="cancel-delete">Cancel</button></div></td></tr>`;
          return `<tr>
            <td><a href="#/article/${a.id}" style="font-weight:600;">${escapeHtml(a.headline)}</a></td>
            <td>${escapeHtml(a.section)}</td>
            <td>${relativeTime(a.timestamp)}</td>
            <td><span class="views-pill ${isTop ? "top" : ""}">${a.views}</span></td>
            <td>${a.breaking ? `<span class="badge-pill breaking">Breaking</span>` : ""}${a.featured ? `<span class="badge-pill featured">Featured</span>` : ""}</td>
            <td><div class="row-actions"><button data-action="edit" data-id="${a.id}">Edit</button><button class="danger" data-action="delete" data-id="${a.id}">Delete</button></div></td>
          </tr>`;
        }).join("")}</tbody>
      </table>
      </div>
    `;
    }

    // ==========================================================
    // ADMIN EVENTS
    // ==========================================================
    function htmlToPlainText(htmlString) {
      const doc = new DOMParser().parseFromString(htmlString, "text/html");
      doc.querySelectorAll("script,style").forEach(el => el.remove());
      doc.querySelectorAll("p,div,br,h1,h2,h3,h4,h5,h6,li").forEach(el => el.insertAdjacentText("afterend", "\n\n"));
      const text = doc.body ? doc.body.textContent : doc.documentElement.textContent;
      return text.replace(/[ \t]+\n/g, "\n").replace(/\n{3,}/g, "\n\n").split("\n").map(l => l.trim()).join("\n").replace(
        /\n{3,}/g, "\n\n").trim();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => { const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file); });
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => { const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file); });
    }

    function captureFormIntoDraft() {
      const get = id => document.getElementById(id);
      if (get("f-section")) formDraft.section = get("f-section").value;
      if (get("f-headline")) formDraft.headline = get("f-headline").value;
      if (get("f-deck")) formDraft.deck = get("f-deck").value;
      if (get("f-byline")) formDraft.byline = get("f-byline").value;
      if (get("f-tags")) formDraft.tags = get("f-tags").value;
      if (get("f-body")) formDraft.body = get("f-body").value;
      if (get("f-caption")) formDraft.caption = get("f-caption").value;
      if (get("f-breaking")) formDraft.breaking = get("f-breaking").checked;
      if (get("f-featured")) formDraft.featured = get("f-featured").checked;
    }

    function bindAdminEvents() {
      const unlockBtn = document.getElementById("adminUnlockBtn");
      if (unlockBtn) { unlockBtn.addEventListener("click", mountLockModal); return; }
      const logoutBtn = document.getElementById("adminLogoutBtn");
      if (logoutBtn) { logoutBtn.addEventListener("click", () => { setAdmin(false);
          render(); }); }
      document.querySelectorAll(".admin-tabs button").forEach(btn => {
        btn.addEventListener("click", () => { adminTab = btn.dataset.tab; if (adminTab === "publish" && !editingId)
            formDraft = blankDraft();
          render(); });
      });
      if (adminTab === "publish") bindPublishFormEvents();
      if (adminTab === "manage") bindManageTableEvents();
    }

    function bindPublishFormEvents() {
      const form = document.getElementById("publishForm");
      if (!form) return;
      document.getElementById("f-section").addEventListener("change", () => { formDraft.section = document.getElementById(
          "f-section").value;
        captureFormIntoDraft();
        render(); });
      const imgInput = document.getElementById("f-imagefile");
      if (imgInput) {
        imgInput.addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try { draftImage = await readFileAsDataURL(file);
            captureFormIntoDraft();
            render(); } catch (err) { showToast("Could not read that image file."); }
        });
      }
      const removeImgBtn = document.getElementById("removeImgBtn");
      if (removeImgBtn) { removeImgBtn.addEventListener("click", () => { draftImage = null;
          captureFormIntoDraft();
          render(); }); }
      const htmlInput = document.getElementById("f-htmlfile");
      if (htmlInput) {
        htmlInput.addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const raw = await readFileAsText(file);
            const plain = htmlToPlainText(raw);
            captureFormIntoDraft();
            formDraft.body = plain;
            if (!formDraft.headline) { const titleMatch = raw.match(/<title[^>]*>([\s\S]*?)<\/title>/i); if (titleMatch)
                formDraft.headline = titleMatch[1].trim(); }
            formDraft.section = "HTML Journal";
            showToast("HTML file imported — text extracted into the body field.");
            render();
          } catch (err) { showToast("Could not read that HTML file."); }
        });
      }
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      if (cancelEditBtn) { cancelEditBtn.addEventListener("click", () => { editingId = null;
          formDraft = blankDraft();
          draftImage = null;
          render(); }); }
      const clearFormBtn = document.getElementById("clearFormBtn");
      if (clearFormBtn) { clearFormBtn.addEventListener("click", () => { formDraft = blankDraft();
          draftImage = null;
          render(); }); }
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        captureFormIntoDraft();
        if (!formDraft.headline.trim()) { showToast("Please add a headline before publishing."); return; }
        if (!formDraft.deck.trim()) { showToast("Please add a deck/summary before publishing."); return; }
        if (!formDraft.byline.trim()) { showToast("Please add a byline before publishing."); return; }
        if (!formDraft.body.trim()) { showToast("Please add body text before publishing."); return; }
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalLabel = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = editingId ? "Saving…" : "Publishing…";
        let success = false;
        if (editingId) {
          const idx = state.articles.findIndex(a => a.id === editingId);
          const updatedFields = { ...formDraft, image: draftImage };
          success = await updateArticleRemote(editingId, updatedFields);
          if (success && idx !== -1) { state.articles[idx] = { ...state.articles[idx], ...updatedFields }; }
          if (success) showToast("Article updated.");
          editingId = null;
        } else {
          const newArticle = { id: uid(), ...formDraft, image: draftImage, timestamp: Date.now(), views: 0 };
          success = await insertArticle(newArticle);
          if (success) { state.articles.push(newArticle);
            showToast("Article published."); }
        }
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;
        if (success) { formDraft = blankDraft();
          draftImage = null;
          adminTab = "manage"; }
        render();
      });
    }

    function bindManageTableEvents() {
      document.querySelectorAll(".article-table th[data-sort]").forEach(th => {
        th.addEventListener("click", () => { const key = th.dataset.sort; if (sortKey === key) { sortDir = sortDir ===
              "asc" ? "desc" : "asc"; } else { sortKey = key;
            sortDir = key === "views" ? "desc" : "desc"; }
          render(); });
      });
      document.querySelectorAll('[data-action="edit"]').forEach(btn => {
        btn.addEventListener("click", () => {
          const a = findArticle(btn.dataset.id);
          if (!a) return;
          editingId = btn.dataset.id;
          formDraft = { section: a.section, headline: a.headline, deck: a.deck, byline: a.byline, body: a.body,
            image: a.image, caption: a.caption || "", breaking: a.breaking, featured: a.featured, tags: a
              .tags || "" };
          draftImage = a.image || null;
          adminTab = "publish";
          render();
        });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener("click", () => { pendingDeleteId = btn.dataset.id;
          render(); });
      });
      document.querySelectorAll('[data-action="cancel-delete"]').forEach(btn => {
        btn.addEventListener("click", () => { pendingDeleteId = null;
          render(); });
      });
      document.querySelectorAll('[data-action="confirm-delete"]').forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          btn.disabled = true;
          btn.textContent = "Deleting…";
          const success = await deleteArticleRemote(id);
          if (success) { state.articles = state.articles.filter(a => a.id !== id);
            showToast("Article deleted."); }
          pendingDeleteId = null;
          render();
        });
      });
    }

          const formData = new FormData(contactForm);
          btn.disabled = true;
          btn.textContent = "Sending…";
          status.textContent = "";
          try {
            const res = await fetch(CONFIG.FORMSPREE_URL, { method: "POST", body: formData, headers: { Accept: "application/json" } });
            if (res.ok) { showToast("Message sent — we'll get back to you soon.");
              contactForm.reset();
              status.textContent = "Sent successfully.";
              status.style.color = "#1e6b4f"; } else { const data = await res.json().catch(() => null);
              status.textContent = data?.errors?.map(e => e.message).join(", ") || "Something went wrong.";
              status.style.color = "#c8102e"; }
          } catch (err) { status.textContent = "Could not send — check your connection.";
            status.style.color = "#c8102e"; } finally { btn.disabled = false;
            btn.textContent = "Send Message"; }
        });
      }
    }

    // ==========================================================
    // RENDER
    // ==========================================================
    function render() {
      const route = state.route;
      document.title = "Journal's Headquarter — World Watch, Military & Tech";
      if (state.loading) {
        document.getElementById("app").innerHTML =
          `<div style="display:flex;align-items:center;justify-content:center;min-height:80vh;font-family:var(--serif);font-size:1.2rem;color:var(--slate);">Loading Journal's Headquarter…</div>`;
        return;
      }
      let html = "";
      if (route === "") html = renderFrontPage();
      else if (route.startsWith("section/")) html = renderSectionPage(route.replace("section/", ""));
      else if (route.startsWith("article/")) html = renderArticlePage(route.replace("article/", ""));
      else if (route.startsWith("tag/")) html = renderTagPage(route.replace("tag/", ""));
      else if (route === "about") html = renderAboutPage();
      else if (route === "privacy") html = renderPrivacyPage();
      else if (route === "terms") html = renderTermsPage();
      else if (route === "disclaimer") html = renderDisclaimerPage();
      else if (route === "contact") html = renderContactPage();
      else if (route === "admin") html = renderAdminPage();
      else html =
        `<div class="empty-state">Page not found. <br><br><a href="#/" class="btn ghost" style="margin-top:10px;display:inline-block;">Back to Front Page</a></div>`;
      document.getElementById("app").innerHTML = renderShell(html) + `<div id="modalRoot"></div>`;
      bindGlobalEvents();
      if (route === "admin") bindAdminEvents();

      // Re-init Google Translate
      if (typeof google !== 'undefined' && google.translate) {
        try {
          new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi', layout: google
              .translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
        } catch (e) {}
      }
    }

    // ==========================================================
    // INIT
    // ==========================================================
    window.addEventListener("hashchange", () => {
      state.route = window.location.hash.replace(/^#\/?/, "") || "";
      render();
      window.scrollTo(0, 0);
    });

    async function init() {
      render();
      let articles = await loadArticles();
      if (articles.length === 0) { showToast("No articles found. Seeding with sample data...");
        await seedDatabase();
        articles = await loadArticles(); }
      state.articles = articles;
      state.loading = false;
      render();
    }

    // Google Translate init
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi', layout: google.translate
          .TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
    }

    init();
  </script>

<html lang="en">

<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
  /* ===== ROOT ===== */
  :root {
    --ink: #16243B;
    --ink-soft: #22335299;
    --cream: #F7F3EA;
    --cream-deep: #EFE9D8;
    --paper: #FFFDF8;
    --red: #C8102E;
    --red-deep: #9C0C22;
    --rule: #D8D2C2;
    --rule-strong: #B9B198;
    --slate: #5A6472;
    --ok: #1E6B4F;
    --focus: #1758C9;
    --serif: "Source Serif 4", Georgia, "Times New Roman", serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html,
  body {
    margin: 0;
    padding: 0;
  }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  img {
    max-width: 100%;
    display: block;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  button {
    font-family: inherit;
    cursor: pointer;
  }
  input,
  textarea,
  select {
    font-family: inherit;
  }
  :focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }
  ::selection {
    background: var(--ink);
    color: var(--cream);
  }

  .skip-link {
    position: absolute;
    left: -999px;
    top: 0;
    background: var(--ink);
    color: var(--cream);
    padding: 8px 14px;
    z-index: 200;
  }
  .skip-link:focus {
    left: 8px;
    top: 8px;
  }

  /* ===== MASTHEAD ===== */
  .masthead-wrap {
    background: var(--paper);
    border-bottom: 4px solid var(--ink);
  }
  .masthead-top {
    max-width: 1180px;
    margin: 0 auto;
    padding: 10px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .06em;
    color: var(--slate);
    text-transform: uppercase;
  }
  .masthead-top .date-line {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .lock-btn {
    background: none;
    border: 1px solid var(--rule-strong);
    border-radius: 3px;
    padding: 5px 9px;
    color: var(--slate);
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: .04em;
  }
  .lock-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .lock-btn svg {
    width: 12px;
    height: 12px;
  }

  .masthead {
    max-width: 1180px;
    margin: 0 auto;
    padding: 6px 20px 22px;
    text-align: center;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 900;
    letter-spacing: -.01em;
    font-size: clamp(40px, 7vw, 72px);
    margin: 0;
    line-height: .95;
  }
  .masthead h1 .the {
    font-size: .32em;
    display: block;
    font-weight: 600;
    letter-spacing: .32em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--slate);
  }
  .masthead .tagline {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--slate);
    margin-top: 8px;
  }

  /* ===== TRANSLATE BAR ===== */
  .translate-wrap {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    background: var(--cream-deep);
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
    color: var(--slate);
    font-family: var(--mono);
    flex-wrap: wrap;
  }
  .translate-wrap .goog-te-combo {
    padding: 4px 8px;
    font-size: 13px;
    border: 1px solid var(--rule-strong);
    border-radius: 3px;
    background: var(--paper);
    font-family: var(--sans);
  }
  .goog-te-banner-frame.skiptranslate {
    display: none !important;
  }
  body {
    top: 0px !important;
  }

  /* ===== SUPPORT BAR ===== */
  .support-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    background: linear-gradient(90deg, #FBF3DE, #F5E8C8, #FBF3DE);
    border-top: 1px solid #E2CE94;
    border-bottom: 1px solid #E2CE94;
    color: #7A5B12;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: pointer;
  }
  .support-bar svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .support-bar:hover {
    background: linear-gradient(90deg, #F5E8C8, #EFDCAE, #F5E8C8);
  }

  /* ===== SUPPORT MODAL ===== */
  .support-modal {
    max-width: 420px;
    text-align: center;
    position: relative;
    padding-top: 36px;
  }
  .support-close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 24px;
    color: var(--slate);
    cursor: pointer;
    line-height: 1;
  }
  .support-close:hover {
    color: var(--ink);
  }
  .support-heart {
    color: #C8952E;
    margin-bottom: 10px;
  }
  .support-heart svg {
    width: 30px;
    height: 30px;
  }
  .support-modal h2 {
    font-size: 21px;
    margin-bottom: 14px;
  }
  .support-copy {
    font-size: 13.5px;
    color: var(--slate);
    line-height: 1.6;
    text-align: left;
    margin-bottom: 20px;
  }
  .support-qr-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .support-qr {
    width: 180px;
    height: 180px;
    border: 4px solid var(--paper);
    box-shadow: 0 0 0 1px var(--rule-strong), 0 6px 18px rgba(0, 0, 0, 0.12);
    border-radius: 4px;
    object-fit: cover;
  }
  .support-qr-placeholder {
    width: 180px;
    height: 180px;
    border: 1.5px dashed var(--rule-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--slate);
    font-family: var(--mono);
    font-size: 12px;
    background: var(--cream-deep);
  }
  .support-upi-row {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    background: var(--cream-deep);
    border: 1px solid var(--rule);
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .support-upi-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    color: var(--slate);
    letter-spacing: .05em;
  }
  .support-upi-id {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    flex: 1;
    text-align: left;
    word-break: break-all;
  }
  .support-copy-btn {
    padding: 6px 12px;
    font-size: 11px;
    flex-shrink: 0;
  }
  .support-thanks {
    font-size: 12.5px;
    color: var(--slate);
    font-style: italic;
  }

  /* ===== NAV ===== */
  nav.main-nav {
    background: var(--ink);
    border-top: 1px solid #0c1626;
  }
  .nav-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .nav-inner a {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: #D9DEE8;
    padding: 13px 16px;
    display: inline-block;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .nav-inner a:hover {
    color: #fff;
    background: #1d2f4c;
  }
  .nav-inner a.active {
    color: #fff;
    border-bottom-color: var(--red);
  }

  /* ===== TICKER ===== */
  .ticker-wrap {
    background: var(--red);
    color: #fff;
    display: flex;
    align-items: center;
    overflow: hidden;
    border-bottom: 1px solid var(--red-deep);
  }
  .ticker-label {
    background: var(--red-deep);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .08em;
    padding: 8px 14px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ticker-track-outer {
    overflow: hidden;
    flex: 1;
    position: relative;
  }
  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 32s linear infinite;
    padding: 8px 0;
    will-change: transform;
  }
  .ticker-track:hover {
    animation-play-state: paused;
  }
  .ticker-track span {
    font-size: 13px;
    font-weight: 500;
    padding: 0 28px;
    border-right: 1px solid #ffffff55;
  }
  @keyframes ticker {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-50%);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .ticker-track {
      animation: none;
      overflow-x: auto;
    }
  }

  /* ===== MAIN LAYOUT ===== */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 34px 20px 60px;
  }
  .page-title {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 30px;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 10px;
    margin: 0 0 26px;
  }

  /* ===== FRONT PAGE ===== */
  .lead-story {
    display: grid;
    grid-template-columns: 1.15fr .85fr;
    gap: 30px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 34px;
    margin-bottom: 34px;
  }
  .lead-story.no-img {
    grid-template-columns: 1fr;
    max-width: 760px;
  }
  .lead-story .lead-img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    background: var(--cream-deep);
    border: 1px solid var(--rule);
  }
  .lead-story .lead-img-cap {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--slate);
    margin-top: 6px;
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tag-breaking {
    background: var(--red);
    color: #fff;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .07em;
    padding: 3px 8px;
    text-transform: uppercase;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
  }
  .tag-chip {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: .03em;
    color: var(--ink);
    background: var(--cream-deep);
    border: 1px solid var(--rule-strong);
    padding: 5px 11px;
    text-transform: lowercase;
  }
  .tag-chip::before {
    content: "#";
    color: var(--red);
    margin-right: 2px;
  }
  .tag-chip:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .tag-chip:hover::before {
    color: #fff;
  }
  .lead-story h2 {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.06;
    margin: 0 0 12px;
    font-weight: 800;
  }
  .lead-story h2 a:hover {
    text-decoration: underline;
  }
  .deck {
    font-family: var(--serif);
    font-size: 17px;
    color: #2b3950;
    line-height: 1.5;
    margin: 0 0 14px;
  }
  .byline-row {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--slate);
    letter-spacing: .02em;
  }
  .byline-row b {
    color: var(--ink);
    font-weight: 700;
  }

  .story-list {
    display: flex;
    flex-direction: column;
  }
  .story-row {
    display: grid;
    grid-template-columns: 1fr 150px;
    gap: 18px;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }
  .story-row:first-child {
    padding-top: 0;
  }
  .story-row .thumb {
    width: 150px;
    height: 100px;
    object-fit: cover;
    background: var(--cream-deep);
    border: 1px solid var(--rule);
  }
  .story-row h3 {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.18;
    margin: 0 0 8px;
    font-weight: 700;
  }
  .story-row .deck {
    font-size: 14.5px;
    margin-bottom: 8px;
    color: #3a4660;
  }
  .story-row.no-img {
    grid-template-columns: 1fr;
  }

  .section-rail {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 36px;
    margin-top: 10px;
  }
  .rail {
    border-left: 1px solid var(--rule);
    padding-left: 24px;
  }
  .rail h4 {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding-bottom: 8px;
    margin: 0 0 14px;
  }
  .rail-item {
    padding: 13px 0;
    border-bottom: 1px solid var(--rule);
  }
  .rail-item:first-child {
    padding-top: 0;
  }
  .rail-item a {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
  }
  .rail-item a:hover {
    text-decoration: underline;
  }
  .rail-item .meta {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--slate);
    margin-top: 5px;
  }

  .empty-state {
    border: 1px dashed var(--rule-strong);
    padding: 50px 30px;
    text-align: center;
    color: var(--slate);
    font-family: var(--serif);
    font-size: 17px;
  }

  /* ===== ARTICLE PAGE ===== */
  .article-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 22px;
    border: 1px solid var(--rule-strong);
    padding: 7px 12px;
  }
  .article-back:hover {
    color: var(--ink);
    border-color: var(--ink);
  }
  .article-head {
    max-width: 760px;
    margin: 0 auto 26px;
    text-align: left;
  }
  .article-head h1 {
    font-family: var(--serif);
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.08;
    font-weight: 800;
    margin: 0 0 14px;
  }
  .article-head .deck {
    font-size: 19px;
    margin-bottom: 16px;
  }
  .article-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--slate);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
  }
  .article-figure {
    max-width: 820px;
    margin: 0 auto 30px;
  }
  .article-figure img {
    width: 100%;
    border: 1px solid var(--rule);
  }
  .article-figure figcaption {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--slate);
    margin-top: 8px;
  }
  .article-body {
    max-width: 680px;
    margin: 0 auto;
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.7;
    color: #1b2840;
  }
  .article-body p {
    margin: 0 0 22px;
  }
  .article-body p:first-of-type::first-letter {
    font-size: 3.4em;
    float: left;
    line-height: .85;
    padding-right: 8px;
    padding-top: 4px;
    font-weight: 800;
    color: var(--ink);
  }

  /* ===== FOOTER ===== */
  footer {
    background: var(--ink);
    color: #C9D1E0;
    margin-top: 40px;
  }
  .footer-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 38px 20px 26px;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 30px;
  }
  .footer-inner h5 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: #8FA0C4;
    margin: 0 0 12px;
  }
  .footer-brand {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }
  .footer-inner p {
    font-size: 13.5px;
    line-height: 1.6;
    color: #A9B3C6;
    margin: 0;
  }
  .footer-links {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .footer-links a {
    font-size: 13.5px;
    color: #C9D1E0;
  }
  .footer-links a:hover {
    color: #fff;
    text-decoration: underline;
  }
  .footer-bottom {
    border-top: 1px solid #2A3C5C;
    padding: 16px 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: #8194B5;
    letter-spacing: .03em;
  }

  /* ===== STATIC PAGES ===== */
  .static-page {
    max-width: 720px;
    margin: 0 auto;
  }
  .static-page h1 {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 800;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 8px;
  }
  .static-page .updated {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--slate);
    margin-bottom: 26px;
    display: block;
  }
  .static-page h2 {
    font-family: var(--serif);
    font-size: 21px;
    margin: 30px 0 10px;
  }
  .static-page p,
  .static-page li {
    font-size: 15.5px;
    line-height: 1.7;
    color: #283450;
  }
  .static-page ul {
    padding-left: 22px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 34px;
    margin-top: 20px;
  }
  .contact-card {
    border: 1px solid var(--rule);
    padding: 20px;
    background: var(--paper);
  }
  .contact-card h3 {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: 0 0 12px;
    color: var(--slate);
  }
  .contact-card .val {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .contact-card a.val-link {
    color: var(--red);
  }
  .form-field {
    margin-bottom: 14px;
  }
  .form-field label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--slate);
    margin-bottom: 5px;
  }
  .form-field input,
  .form-field textarea {
    width: 100%;
    border: 1px solid var(--rule-strong);
    background: var(--paper);
    padding: 9px 11px;
    font-size: 14.5px;
    color: var(--ink);
  }
  .form-field textarea {
    min-height: 100px;
    resize: vertical;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 11px 20px;
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  }

    background: var(--red);

  .toast {

    bottom: 22px;

    padding: 13px 18px;
    font-family: var(--mono);
    font-size: 13px;

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #0d1626d9;
    z-index: 300;
    display: flex;
    align-items: center;

  .modal-box {
    background: var(--paper);

  .modal-box h2 {
    font-family: var(--serif);

  .modal-box p {

  /* ===== ADMIN ===== */
  .admin-shell {
    max-width: 1180px;

  .admin-bar {

  .admin-tabs button {

  .admin-grid {
    display: grid;

  }
  fieldset {
    border: 1px solid var(--rule);

    margin: 0 0 18px;
  }
  legend {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--slate);
    padding: 0 6px;
  }
  .form-field select {
    width: 100%;
    border: 1px solid var(--rule-strong);
    background: var(--paper);
    padding: 9px 11px;
    font-size: 14.5px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .checkbox-row input {
    width: 16px;
    height: 16px;
  }
  .checkbox-row label {
    font-size: 13.5px;
    color: var(--ink);
  }
  .checkbox-row.breaking label {
    color: var(--red);
    font-weight: 700;
  }
  .file-drop {
    border: 1.5px dashed var(--rule-strong);
    padding: 18px;
    text-align: center;
    background: var(--cream-deep);
    font-size: 13px;
    color: var(--slate);
    position: relative;
    cursor: pointer;
  }
  .file-drop input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;

  .file-drop.has-file {
    border-color: var(--ok);
    background: #E9F4EE;
    color: var(--ok);
  }
  .img-preview {
    max-height: 160px;
    margin-top: 12px;
    border: 1px solid var(--rule);
  }
  .htmljournal-box {
    background: #EEF3FA;
    border: 1px solid #C5D4EA;

    margin-bottom: 16px;

  .htmljournal-box p {

  }

  .article-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  .article-table th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--slate);
    border-bottom: 2px solid var(--ink);
    padding: 8px 10px;
    cursor: pointer;
    user-select: none;
  }
  .article-table th.sorted::after {
    content: " ▾";
  }
  .article-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--rule);

  }
  .article-table tr:hover td {

  .views-pill {
    font-family: var(--mono);
    font-weight: 700;
    background: var(--ink);
    color: #fff;
    padding: 3px 9px;
    border-radius: 2px;

  }
  .views-pill.top {
    background: var(--red);
  }
  .row-actions {
    display: flex;
    gap: 6px;
  }
  .row-actions button {
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--rule-strong);
    background: transparent;
    padding: 5px 9px;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .row-actions button:hover {
    border-color: var(--ink);
  }
  .row-actions button.danger:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .confirm-row td {

  }
  .confirm-inline {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12.5px;
  }

  .badge-pill {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    background: var(--cream-deep);
    padding: 3px 8px;
    border: 1px solid var(--rule);
  }
  .badge-pill.featured {
    background: #1758C91A;
    color: #1758C9;
    border-color: #1758C955;
  }
  .badge-pill.breaking {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }

  @media (max-width: 860px) {
    .lead-story {
      grid-template-columns: 1fr;
    }
    .section-rail {
      grid-template-columns: 1fr;
    }
    .rail {
      border-left: none;
      border-top: 1px solid var(--rule);
      padding-left: 0;
      padding-top: 20px;
    }
    .footer-inner {
      grid-template-columns: 1fr;
      gap: 24px;
    }
    .contact-grid {
      grid-template-columns: 1fr;
    }
    .admin-grid {
      grid-template-columns: 1fr;
    }
    .story-row {
      grid-template-columns: 1fr;
    }
    .story-row .thumb {
      width: 100%;
      height: 180px;
      order: -1;
    }
    .article-table th:nth-child(3),
    .article-table td:nth-child(3) {
      display: none;
    }
  }
</style>

<body>

<a href="#main" class="skip-link">Skip to content</a>
<div id="app"></div>

<script>
  // ==========================================================
  // CONFIGURATION
  // ==========================================================

  const CONFIG = {
    ADMIN_PW: "solojournal2026",
    FORMSPREE_URL: "https://formspree.io/f/xeebkkyp",
    UPI_ID: "6393079532@fam",
    PHONE: "+91 6393079532",
    EMAIL: "theonejournal2026@gmail.com",
    YT_NAME: "ADI GEOSPACE",
    YT_URL: "https://www.youtube.com/@Adigeospace",
    QR_IMAGE: "upi-qr.png",
    SUPABASE_URL: "https://dsaifutdyvbczzwmsbdo.supabase.co",
    SUPABASE_KEY: "sb_publishable_ljFRr85nhwfv0kunVEZSig_Ckcbvy65",
  };

  const SECTIONS = ["World Watch", "Regional Watch", "Military & Tech Watch", "HTML Journal"];

  // ==========================================================
  // SUPABASE HELPERS
  // ==========================================================

  const SB_HEADERS = {
    apikey: CONFIG.SUPABASE_KEY,
    Authorization: `Bearer ${CONFIG.SUPABASE_KEY}`,
    "Content-Type": "application/json",
  };

  async function loadArticles() {
    try {
      const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?select=*&order=timestamp.desc`, {
        headers: SB_HEADERS,
      });
      if (!res.ok) throw new Error("Failed to load");
      const data = await res.json();
      return data.map(normalizeRow);
    } catch (e) {
      console.error("Load error", e);
      showToast("Could not load articles. Check Supabase connection.");
      return [];
    }
  }

  function normalizeRow(row) {
    return {
      id: row.id,
      section: row.section,
      headline: row.headline,
      deck: row.deck || "",
      byline: row.byline,
      body: row.body,
      image: row.image,
      caption: row.caption || "",
      breaking: row.breaking || false,
      featured: row.featured || false,
      tags: row.tags || "",
      timestamp: row.timestamp,
      views: row.views || 0,
    };
  }

  async function insertArticle(article) {
    try {
      const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles`, {
        method: "POST",
        headers: { ...SB_HEADERS, Prefer: "return=minimal" },
        body: JSON.stringify([article]),
      });
      return res.ok;
    } catch (e) {
      console.error("Insert error", e);
      return false;
    }
  }

  async function updateArticleRemote(id, fields) {
    try {
      const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: { ...SB_HEADERS, Prefer: "return=minimal" },
        body: JSON.stringify(fields),
      });
      return res.ok;
    } catch (e) {
      console.error("Update error", e);
      return false;
    }
  }

  async function deleteArticleRemote(id) {
    try {
      const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
        method: "DELETE",
        headers: SB_HEADERS,
      });
      return res.ok;
    } catch (e) {
      console.error("Delete error", e);
      return false;
    }
  }

  async function incrementView(id) {
    const article = state.articles.find((a) => a.id === id);
    if (!article) return;
    const newCount = (article.views || 0) + 1;
    article.views = newCount;
    try {
      await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: { ...SB_HEADERS, Prefer: "return=minimal" },
        body: JSON.stringify({ views: newCount }),
      });
    } catch (e) {
      console.error("View increment error", e);
    }
  }

  // ==========================================================
  // STATE
  // ==========================================================

  let state = {
    articles: [],
    route: window.location.hash.replace(/^#\/?/, "") || "",
    loading: true,
  };

  function isAdmin() {
    return sessionStorage.getItem("journal_admin") === "1";
  }

  function setAdmin(val) {
    sessionStorage.setItem("journal_admin", val ? "1" : "0");
  }

  // ==========================================================
  // UTILITY
  // ==========================================================

  function uid() {
    return "a" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(str) {
    if (str == null) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function nl2paragraphs(body) {
    return body
      .split(/\n\s*\n/)
      .map((p) => p.trim())
      .filter(Boolean)
      .map((p) => `<p>${escapeHtml(p).replace(/\n/g, "<br>")}</p>`)
      .join("");
  }

  function relativeTime(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return "just now";
    if (min < 60) return min + "m ago";
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + "h ago";
    const days = Math.floor(hr / 24);
    if (days < 7) return days + "d ago";
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  function fullDate(ts) {
    return new Date(ts).toLocaleString(undefined, {
      weekday: "short",
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function slugify(str) {
    return str.toLowerCase().replace(/\s+/g, "-");
  }

  function parseTags(str) {
    if (!str) return [];
    return str.split(",").map((t) => t.trim()).filter(Boolean);
  }

  function tagSlug(tag) {
    return tag.toLowerCase().trim().replace(/\s+/g, "-");
  }

  function getArticlesBySection(section) {
    return state.articles.filter((a) => a.section === section).sort((a, b) => b.timestamp - a.timestamp);
  }

  function getAllSorted() {
    return [...state.articles].sort((a, b) => b.timestamp - a.timestamp);
  }

  function getLeadStory() {
    const featured = state.articles.filter((a) => a.featured).sort((a, b) => b.timestamp - a.timestamp);
    if (featured.length) return featured[0];
    return getAllSorted()[0] || null;
  }

  function findArticle(id) {
    return state.articles.find((a) => a.id === id);
  }

  function getArticlesByTag(tagSlug) {
    return state.articles
      .filter((a) => parseTags(a.tags).some((t) => tagSlug(t) === tagSlug))
      .sort((a, b) => b.timestamp - a.timestamp);
  }

  function slugToSection(slug) {
    return SECTIONS.find((s) => slugify(s) === slug);
  }

  function showToast(msg) {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }

  // ==========================================================
  // RENDER FUNCTIONS
  // ==========================================================

  function renderShell(innerHtml) {
    const today = new Date().toLocaleDateString(undefined, {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
    });

    const tickerItems = getAllSorted().slice(0, 8);
    const tickerHtml = tickerItems.length ?
      tickerItems.map((a) => `<span>${a.breaking ? "BREAKING — " : ""}${escapeHtml(a.headline)}</span>`).join("") :
      `<span>Welcome to Journal's Headquarter — your stories will appear here once published.</span>`;

    const route = state.route;
    const navActive = (key) => (route === key ? "active" : "");

    return `
    <div class="masthead-wrap">
      <div class="masthead-top">
        <div class="date-line">
          <span>${escapeHtml(today)}</span>
        </div>
        <button class="lock-btn" id="lockBtn" aria-label="Open control panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          Control Panel
        </button>
      </div>
      <div class="masthead">
        <a href="#/" style="display:inline-block;">
          <h1><span class="the">The</span>Journal's Headquarter</h1>
        </a>
        <div class="tagline">World Watch · Regional Watch · Military &amp; Tech Watch</div>
      </div>
      <div class="translate-wrap">
        <span>🌐 Translate:</span>
        <div id="google_translate_element"></div>
      </div>
      <button class="support-bar" id="supportBarBtn" aria-label="Support independent journalism">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Support Independent Journalism</span>
      </button>
      <nav class="main-nav">
        <div class="nav-inner">
          <a href="#/" class="${navActive("")}">Front Page</a>
          <a href="#/section/world-watch" class="${route === "section/world-watch" ? "active" : ""}">World Watch</a>
          <a href="#/section/regional-watch" class="${route === "section/regional-watch" ? "active" : ""}">Regional Watch</a>
          <a href="#/section/military-tech-watch" class="${route === "section/military-tech-watch" ? "active" : ""}">Military &amp; Tech Watch</a>
          <a href="#/section/html-journal" class="${route === "section/html-journal" ? "active" : ""}">HTML Journal</a>
        </div>
      </nav>
    </div>
    <div class="ticker-wrap">
      <div class="ticker-label">Latest</div>
      <div class="ticker-track-outer">
        <div class="ticker-track">${tickerHtml}${tickerHtml}</div>
      </div>
    </div>
    <main id="main">${innerHtml}</main>
    ${renderFooter()}
  `;
  }

  function renderFooter() {
    return `
    <footer>
      <div class="footer-inner">
        <div>
          <div class="footer-brand">Journal's Headquarter</div>
          <p>Independent daily reporting on World Watch, Regional Watch, and Military &amp; Tech — clear, timely, and to the point.</p>
        </div>
        <div>
          <h5>Sections</h5>
          <div class="footer-links">
            <a href="#/section/world-watch">World Watch</a>
            <a href="#/section/regional-watch">Regional Watch</a>
            <a href="#/section/military-tech-watch">Military &amp; Tech Watch</a>
            <a href="#/section/html-journal">HTML Journal</a>
          </div>
        </div>
        <div>
          <h5>Site</h5>
          <div class="footer-links">
            <a href="#/about">About Us</a>
            <a href="#/contact">Contact Us</a>
            <a href="#/privacy">Privacy Policy</a>
            <a href="#/terms">Terms of Service</a>
            <a href="#/disclaimer">Disclaimer</a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">© ${new Date().getFullYear()} Journal's Headquarter. All rights reserved.</div>
    </footer>
  `;
  }

  // ==========================================================
  // PAGE RENDERERS
  // ==========================================================

  function renderFrontPage() {
    const all = getAllSorted();
    if (!all.length) {
      return `
      <div class="empty-state">No articles published yet. Open the control panel to publish your first story.</div>
    `;
    }

    const lead = getLeadStory();
    const rest = all.filter((a) => a.id !== lead.id).slice(0, 8);

    const leadHtml = `
    <article class="lead-story${lead.image ? "" : " no-img"}">
      ${lead.image ? `<div>
        <img class="lead-img" src="${lead.image}" alt="${escapeHtml(lead.headline)}">${lead.caption ? `<div class="lead-img-cap">${escapeHtml(lead.caption)}</div>` : ""}
      </div>` : ""}
      <div>
        <div class="section-eyebrow">
          ${lead.breaking ? `<span class="tag-breaking">Breaking</span>` : ""}
          <span>${escapeHtml(lead.section)}</span>
        </div>
        <h2><a href="#/article/${lead.id}">${escapeHtml(lead.headline)}</a></h2>
        <p class="deck">${escapeHtml(lead.deck)}</p>
        <div class="byline-row">By <b>${escapeHtml(lead.byline)}</b> · ${relativeTime(lead.timestamp)}</div>
      </div>
    </article>
  `;

    const listHtml = rest.map((a) => `
    <article class="story-row ${a.image ? "" : "no-img"}">
      <div>
        <div class="section-eyebrow">
          ${a.breaking ? `<span class="tag-breaking">Breaking</span>` : ""}
          <span>${escapeHtml(a.section)}</span>
        </div>
        <h3><a href="#/article/${a.id}">${escapeHtml(a.headline)}</a></h3>
        <p class="deck">${escapeHtml(a.deck)}</p>
        <div class="byline-row">By <b>${escapeHtml(a.byline)}</b> · ${relativeTime(a.timestamp)}</div>
      </div>
      ${a.image ? `<img class="thumb" src="${a.image}" alt="">` : ""}
    </article>
  `).join("");

    return `
    ${leadHtml}
    <div class="section-rail">
      <div class="story-list">${listHtml}</div>
      <div class="rail">
        ${renderRail("World Watch")}
        ${renderRail("Regional Watch")}
        ${renderRail("Military & Tech Watch")}
      </div>
    </div>
  `;
  }

  function renderRail(section) {
    const items = getArticlesBySection(section).slice(0, 4);
    if (!items.length) return "";
    return `
    <h4>${escapeHtml(section)}</h4>
    ${items.map((a) => `
      <div class="rail-item">
        <a href="#/article/${a.id}">${escapeHtml(a.headline)}</a>
        <div class="meta">${a.breaking ? "BREAKING · " : ""}${relativeTime(a.timestamp)}</div>
      </div>
    `).join("")}
  `;
  }

  function renderSectionPage(slug) {
    const section = slugToSection(slug);
    if (!section) {
      return `<div class="empty-state">Section not found.</div>`;
    }
    const items = getArticlesBySection(section);
    document.title = `${section} — Journal's Headquarter`;

    if (!items.length) {
      return `
      <h1 class="page-title">${escapeHtml(section)}</h1>
      <div class="empty-state">No ${escapeHtml(section)} articles yet. Check back soon.</div>
    `;
    }

    return `
    <h1 class="page-title">${escapeHtml(section)}</h1>
    <div class="story-list">
      ${items.map((a) => `
        <article class="story-row ${a.image ? "" : "no-img"}">
          <div>
            <div class="section-eyebrow">
              ${a.breaking ? `<span class="tag-breaking">Breaking</span>` : ""}
              <span>${escapeHtml(a.section)}</span>
            </div>
            <h3><a href="#/article/${a.id}">${escapeHtml(a.headline)}</a></h3>
            <p class="deck">${escapeHtml(a.deck)}</p>
            <div class="byline-row">By <b>${escapeHtml(a.byline)}</b> · ${relativeTime(a.timestamp)}</div>
          </div>
          ${a.image ? `<img class="thumb" src="${a.image}" alt="">` : ""}

  let viewedThisSession = new Set();

  function renderArticlePage(id) {
    const article = findArticle(id);
    if (!article) {
      return `<div class="empty-state">Article not found. <br><br><a href="#/" class="btn ghost" style="margin-top:10px;display:inline-block;">Back to Front Page</a></div>`;

    document.title = `${article.headline} — Journal's Headquarter`;

    if (!viewedThisSession.has(id)) {
      incrementView(id);
      viewedThisSession.add(id);
    }
    const views = getViewCount(id);
    const tags = parseTags(article.tags);

    return `
    <a href="#/" class="article-back">&larr; Back</a>
    <div class="article-head">
      <div class="section-eyebrow">
        ${article.breaking ? `<span class="tag-breaking">Breaking</span>` : ""}

  function getViewCount(id) {
    const article = state.articles.find((a) => a.id === id);

  function renderManageTable() {
    if (!state.articles.length) {
      return `<div class="empty-state">No articles yet. Publish your first one from the "Publish New Article" tab.</div>`;
    }

    let rows = state.articles.map((a) => ({ ...a, views: a.views || 0 }));

    rows.sort((a, b) => {
      let av = a[sortKey],
        bv = b[sortKey];
      if (typeof av === "string") { av = av.toLowerCase();
        bv = bv.toLowerCase(); }
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });

    const maxViews = Math.max(...rows.map((r) => r.views), 0);

    return `
    <div style="overflow-x:auto;">
    <table class="article-table">
      <thead>
        <tr>
          <th class="${sortKey === "headline" ? "sorted" : ""}" data-sort="headline">Headline</th>
          <th class="${sortKey === "section" ? "sorted" : ""}" data-sort="section">Section</th>
          <th class="${sortKey === "timestamp" ? "sorted" : ""}" data-sort="timestamp">Published</th>
          <th class="${sortKey === "views" ? "sorted" : ""}" data-sort="views">Views</th>
          <th>Flags</th>
          <th>Actions</th>
        </tr>

        ${rows.map((a) => {
          const isTop = a.views === maxViews && maxViews > 0;
          if (pendingDeleteId === a.id) {
            return `

                  <td colspan="6">
                    <div class="confirm-inline">

                      <button class="btn ghost" data-action="cancel-delete" type="button">Cancel</button>
                    </div>
                  </td>

          }
          return `

              <td><a href="#/article/${a.id}" style="font-weight:600;">${escapeHtml(a.headline)}</a></td>
              <td>${escapeHtml(a.section)}</td>

              <td>
                ${a.breaking ? `<span class="badge-pill breaking">Breaking</span>` : ""}

                  <button type="button" class="danger" data-action="delete" data-id="${a.id}">Delete</button>
                </div>
              </td>
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>

  `;
  }

  function htmlToPlainText(htmlString) {
    const doc = new DOMParser().parseFromString(htmlString, "text/html");
    doc.querySelectorAll("script,style").forEach((el) => el.remove());
    doc.querySelectorAll("p,div,br,h1,h2,h3,h4,h5,h6,li").forEach((el) => {
      el.insertAdjacentText("afterend", "\n\n");
    });
    const text = doc.body ? doc.body.textContent : doc.documentElement.textContent;
    return text
      .replace(/[ \t]+\n/g, "\n")
      .replace(/\n{3,}/g, "\n\n")
      .split("\n")
      .map((l) => l.trim())
      .join("\n")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsText(file);
    });
  }

  function captureFormIntoDraft() {
    const get = (id) => document.getElementById(id);
    if (get("f-section")) formDraft.section = get("f-section").value;
    if (get("f-headline")) formDraft.headline = get("f-headline").value;
    if (get("f-deck")) formDraft.deck = get("f-deck").value;
    if (get("f-byline")) formDraft.byline = get("f-byline").value;
    if (get("f-tags")) formDraft.tags = get("f-tags").value;
    if (get("f-body")) formDraft.body = get("f-body").value;
    if (get("f-caption")) formDraft.caption = get("f-caption").value;
    if (get("f-breaking")) formDraft.breaking = get("f-breaking").checked;
    if (get("f-featured")) formDraft.featured = get("f-featured").checked;
  }

  function bindAdminEvents() {
    const unlockBtn = document.getElementById("adminUnlockBtn");
    if (unlockBtn) {
      unlockBtn.addEventListener("click", mountLockModal);
      return;
    }

    const logoutBtn = document.getElementById("adminLogoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        setAdmin(false);
        render();
      });
    }

    document.querySelectorAll(".admin-tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        adminTab = btn.dataset.tab;
        if (adminTab === "publish" && !editingId) formDraft = blankDraft();
        render();
      });
    });

    if (adminTab === "publish") bindPublishFormEvents();
    if (adminTab === "manage") bindManageTableEvents();
  }

  function bindPublishFormEvents() {
    const form = document.getElementById("publishForm");
    if (!form) return;

    const sectionSel = document.getElementById("f-section");
    sectionSel.addEventListener("change", () => {
      formDraft.section = sectionSel.value;
      captureFormIntoDraft();
      render();
    });

    const imgInput = document.getElementById("f-imagefile");
    if (imgInput) {
      imgInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await readFileAsDataURL(file);
          draftImage = dataUrl;
          captureFormIntoDraft();
          render();
        } catch (err) {
          showToast("Could not read that image file.");
        }
      });
    }

    const removeImgBtn = document.getElementById("removeImgBtn");
    if (removeImgBtn) {
      removeImgBtn.addEventListener("click", () => {
        draftImage = null;
        captureFormIntoDraft();
        render();
      });
    }

    const htmlInput = document.getElementById("f-htmlfile");
    if (htmlInput) {
      htmlInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const raw = await readFileAsText(file);
          const plain = htmlToPlainText(raw);
          captureFormIntoDraft();
          formDraft.body = plain;
          if (!formDraft.headline) {
            const titleMatch = raw.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            if (titleMatch) formDraft.headline = titleMatch[1].trim();
          }
          formDraft.section = "HTML Journal";
          showToast("HTML file imported — text extracted into the body field.");
          render();
        } catch (err) {
          showToast("Could not read that HTML file.");
        }
      });
    }

    const cancelEditBtn = document.getElementById("cancelEditBtn");
    if (cancelEditBtn) {
      cancelEditBtn.addEventListener("click", () => {
        editingId = null;
        formDraft = blankDraft();
        draftImage = null;
        render();
      });
    }

    const clearFormBtn = document.getElementById("clearFormBtn");
    if (clearFormBtn) {
      clearFormBtn.addEventListener("click", () => {
        formDraft = blankDraft();
        draftImage = null;
        render();
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      captureFormIntoDraft();

      if (!formDraft.headline.trim()) { showToast("Please add a headline before publishing."); return; }
      if (!formDraft.deck.trim()) { showToast("Please add a deck/summary before publishing."); return; }
      if (!formDraft.byline.trim()) { showToast("Please add a byline before publishing."); return; }
      if (!formDraft.body.trim()) { showToast("Please add body text before publishing."); return; }

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalLabel = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = editingId ? "Saving…" : "Publishing…";

      let success = false;

      if (editingId) {
        const idx = state.articles.findIndex((a) => a.id === editingId);
        const updatedFields = { ...formDraft, image: draftImage };
        success = await updateArticleRemote(editingId, updatedFields);
        if (success && idx !== -1) {
          state.articles[idx] = { ...state.articles[idx], ...updatedFields };
        }
        if (success) showToast("Article updated.");
        editingId = null;
      } else {
        const newArticle = {
          id: uid(),
          ...formDraft,
          image: draftImage,
          timestamp: Date.now(),
          views: 0,
        };
        success = await insertArticle(newArticle);
        if (success) {
          state.articles.push(newArticle);
          showToast("Article published.");
        }
      }

      submitBtn.disabled = false;
      submitBtn.textContent = originalLabel;

      if (success) {
        formDraft = blankDraft();
        draftImage = null;
        adminTab = "manage";
      }
      render();
    });
  }

  function bindManageTableEvents() {
    document.querySelectorAll(".article-table th[data-sort]").forEach((th) => {
      th.addEventListener("click", () => {
        const key = th.dataset.sort;
        if (sortKey === key) {
          sortDir = sortDir === "asc" ? "desc" : "asc";
        } else {
          sortKey = key;
          sortDir = key === "views" ? "desc" : "desc";
        }
        render();
      });
    });

    document.querySelectorAll('[data-action="edit"]').forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.id;
        const a = findArticle(id);
        if (!a) return;
        editingId = id;
        formDraft = {
          section: a.section,
          headline: a.headline,
          deck: a.deck,
          byline: a.byline,
          body: a.body,
          image: a.image,
          caption: a.caption || "",
          breaking: a.breaking,
          featured: a.featured,
          tags: a.tags || "",
        };
        draftImage = a.image || null;
        adminTab = "publish";
        render();
      });
    });

    document.querySelectorAll('[data-action="delete"]').forEach((btn) => {
      btn.addEventListener("click", () => {
        pendingDeleteId = btn.dataset.id;
        render();
      });
    });

    document.querySelectorAll('[data-action="cancel-delete"]').forEach((btn) => {
      btn.addEventListener("click", () => {
        pendingDeleteId = null;
        render();
      });
    });

    document.querySelectorAll('[data-action="confirm-delete"]').forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.dataset.id;
        btn.disabled = true;
        btn.textContent = "Deleting…";
        const success = await deleteArticleRemote(id);
        if (success) {
          state.articles = state.articles.filter((a) => a.id !== id);
          showToast("Article deleted.");
        }
        pendingDeleteId = null;
        render();
      });
    });
  }

  // ==========================================================
  // LOCK / SUPPORT MODALS
  // ==========================================================

  function renderLockModal() {
    return `
    <div class="modal-overlay" id="lockOverlay">
      <div class="modal-box">
        <h2>Control Panel</h2>
        <p>Enter the admin password to manage articles.</p>
        <form id="lockForm">
          <div class="form-field">
            <label for="pwInput">Password</label>
            <input id="pwInput" type="password" autocomplete="current-password" autofocus>
          </div>
          <div id="lockErr" class="modal-err"></div>
          <div class="modal-actions">
            <button type="submit" class="btn red">Unlock</button>
            <button type="button" class="btn ghost" id="lockCancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  `;
  }

  function mountLockModal() {
    const root = document.getElementById("modalRoot");
    root.innerHTML = renderLockModal();
    const overlay = document.getElementById("lockOverlay");
    const form = document.getElementById("lockForm");
    const input = document.getElementById("pwInput");
    const err = document.getElementById("lockErr");

    input.focus();

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) root.innerHTML = "";
    });
    document.getElementById("lockCancel").addEventListener("click", () => {
      root.innerHTML = "";
    });
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value === CONFIG.ADMIN_PW) {
        setAdmin(true);
        root.innerHTML = "";
        window.location.hash = "#/admin";
      } else {
        err.textContent = "Incorrect password. Try again.";
        input.value = "";
        input.focus();
      }
    });
  }

  function renderSupportModal() {
    return `
    <div class="modal-overlay" id="supportOverlay">
      <div class="modal-box support-modal">
        <button class="support-close" id="supportClose" aria-label="Close">&times;</button>
        <div class="support-heart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <h2>Support Independent Journalism</h2>
        <p class="support-copy">
          Journal's Headquarter is not funded by any government, agency, or organization. This site runs entirely on one person's ambition — to build independent, non-biased journalism, free from outside influence. Your single donation directly powers that ambition.
        </p>
        <div class="support-qr-wrap">
          <img src="${CONFIG.QR_IMAGE}" alt="UPI QR Code" class="support-qr" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="support-qr-placeholder" style="display:none;">QR Code</div>
        </div>
        <div class="support-upi-row">
          <span class="support-upi-label">UPI ID</span>
          <span class="support-upi-id" id="upiIdText">${escapeHtml(CONFIG.UPI_ID)}</span>
          <button class="btn ghost support-copy-btn" id="copyUpiBtn" type="button">Copy</button>
        </div>
        <p class="support-thanks">Every contribution, big or small, helps keep this journal independent. Thank you.</p>
      </div>
    </div>
  `;
  }

  function mountSupportModal() {
    const root = document.getElementById("modalRoot");
    root.innerHTML = renderSupportModal();
    const overlay = document.getElementById("supportOverlay");

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) root.innerHTML = "";
    });
    document.getElementById("supportClose").addEventListener("click", () => {
      root.innerHTML = "";
    });
    document.getElementById("copyUpiBtn").addEventListener("click", async () => {
      const btn = document.getElementById("copyUpiBtn");
      try {
        await navigator.clipboard.writeText(CONFIG.UPI_ID);
        btn.textContent = "Copied!";
        setTimeout(() => { btn.textContent = "Copy"; }, 1800);
      } catch (e) {
        showToast("Could not copy — please copy the UPI ID manually.");
      }
    });
  }

  // ==========================================================
  // GLOBAL EVENTS
  // ==========================================================

  function bindGlobalEvents() {
    const lockBtn = document.getElementById("lockBtn");
    if (lockBtn) {
      lockBtn.addEventListener("click", () => {
        if (isAdmin()) {
          window.location.hash = "#/admin";
        } else {
          mountLockModal();
        }
      });
    }

    const supportBarBtn = document.getElementById("supportBarBtn");
    if (supportBarBtn) {
      supportBarBtn.addEventListener("click", () => {
        mountSupportModal();
      });
    }

    const contactForm = document.getElementById("contactForm");
    if (contactForm) {
      contactForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("cfSubmitBtn");
        const status = document.getElementById("cfStatus");
        const formData = new FormData(contactForm);

        btn.disabled = true;
        btn.textContent = "Sending…";
        status.textContent = "";
        status.style.color = "";

        try {
          const res = await fetch(CONFIG.FORMSPREE_URL, {
            method: "POST",
            body: formData,
            headers: { Accept: "application/json" },
          });

          if (res.ok) {
            showToast("Message sent — we'll get back to you soon.");
            contactForm.reset();
            status.textContent = "Sent successfully.";
            status.style.color = "var(--ok)";
          } else {
            const data = await res.json().catch(() => null);
            const msg = data && data.errors ? data.errors.map((er) => er.message).join(", ") : "Something went wrong sending your message.";
            status.textContent = msg;
            status.style.color = "var(--red)";
          }
        } catch (err) {
          status.textContent = "Could not send — check your connection and try again.";
          status.style.color = "var(--red)";
        } finally {
          btn.disabled = false;
          btn.textContent = "Send Message";
        }
      });
    }
  }

  // ==========================================================
  // ROUTER / RENDER
  // ==========================================================

  function render() {
    const route = state.route;
    let html = "";
    document.title = "Journal's Headquarter — World Watch, Military & Tech";

    if (state.loading) {
      document.getElementById("app").innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Source Serif 4',Georgia,serif;font-size:18px;color:#5A6472;">
        Loading Journal's Headquarter…
      </div>
    `;
      return;
    }

    if (route === "") {
      html = renderFrontPage();
    } else if (route.startsWith("section/")) {
      html = renderSectionPage(route.replace("section/", ""));
    } else if (route.startsWith("article/")) {
      html = renderArticlePage(route.replace("article/", ""));
    } else if (route.startsWith("tag/")) {
      html = renderTagPage(route.replace("tag/", ""));
    } else if (route === "about") {
      html = renderAboutPage();
    } else if (route === "privacy") {
      html = renderPrivacyPage();
    } else if (route === "terms") {
      html = renderTermsPage();
    } else if (route === "disclaimer") {
      html = renderDisclaimerPage();
    } else if (route === "contact") {
      html = renderContactPage();
    } else if (route === "admin") {
      html = renderAdminPage();
    } else {
      html = `<div class="empty-state">Page not found. <br><br><a href="#/" class="btn ghost" style="margin-top:10px;display:inline-block;">Back to Front Page</a></div>`;
    }

    document.getElementById("app").innerHTML = renderShell(html) + `<div id="modalRoot"></div>`;
    bindGlobalEvents();

    // Re-run Google Translate after DOM update
    if (typeof google !== 'undefined' && google.translate) {
      try {
        new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
      } catch (e) {}
    }

    if (route === "admin") bindAdminEvents();
  }

  // ==========================================================
  // INIT
  // ==========================================================

  window.addEventListener("hashchange", () => {
    state.route = window.location.hash.replace(/^#\/?/, "") || "";
    render();
    window.scrollTo(0, 0);
  });

  async function init() {
    render();
    state.articles = await loadArticles();
    state.loading = false;
    render();
  }

  // Seed data function for empty database
  async function seedDatabase() {
    const seedData = [{
      id: "seed-1",
      section: "World Watch",
      headline: "Global Diplomacy Intensifies as Tensions Rise in Eastern Europe",
      deck: "Leaders from multiple nations engage in emergency talks amid growing concerns over regional stability.",
      byline: "Arjun Singh",
      body: "Diplomatic channels are working overtime this week as tensions continue to escalate in Eastern Europe.\n\nMultiple rounds of emergency talks have been held, with both sides signaling a willingness to de-escalate while maintaining their core positions.\n\nAnalysts suggest that the coming days will be critical in determining whether a diplomatic breakthrough or further confrontation lies ahead.",
      image: null,
      caption: "",
      breaking: true,
      featured: true,
      tags: "Diplomacy, Europe, Conflict",
      timestamp: Date.now() - 1000 * 60 * 60 * 2,
      views: 0,
    }, {
      id: "seed-2",
      section: "Military & Tech Watch",
      headline: "Next-Gen Stealth Fighter Completes Final Trials",
      deck: "The new stealth fighter jet has successfully completed its final testing phase, clearing the way for full-rate production.",
      byline: "Vikram Rathore",
      body: "The next-generation stealth fighter has concluded its final trials, demonstrating exceptional performance across all key metrics.\n\nDefense officials confirmed that the aircraft exceeded expectations in terms of range, stealth capability, and sensor integration.\n\nProduction is expected to begin in the coming months, with the first units scheduled for delivery to frontline squadrons.",
      image: null,
      caption: "",
      breaking: false,
      featured: false,
      tags: "Defense, Aviation, Technology",
      timestamp: Date.now() - 1000 * 60 * 60 * 5,
      views: 0,
    }, {
      id: "seed-3",
      section: "Regional Watch",
      headline: "South Asia Energy Summit Seeks Regional Cooperation",
      deck: "Energy ministers from across South Asia gather to discuss joint infrastructure projects and energy security.",
      byline: "Priya Sharma",
      body: "The South Asia Energy Summit is underway, with representatives from all major economies in the region participating.\n\nDiscussions are centered on cross-border energy infrastructure, renewable energy collaboration, and shared grid connectivity.\n\nObservers note that energy cooperation has emerged as one of the few areas where regional consensus is achievable despite broader geopolitical differences.",
      image: null,
      caption: "",
      breaking: false,
      featured: false,
      tags: "Energy, South Asia, Infrastructure",
      timestamp: Date.now() - 1000 * 60 * 60 * 10,
      views: 0,
    }, {
      id: "seed-4",
      section: "HTML Journal",
      headline: "Welcome to Journal's Headquarter",
      deck: "A dedicated space for long-form analysis, archival material, and special reports.",
      byline: "The Editors",
      body: "HTML Journal is a special section for longer-form writing and archival material.\n\nArticles here can be authored directly in the control panel, or imported from an existing .html file.\n\nWe encourage contributors to make use of this space for in-depth analysis and historical documentation.",
      image: null,
      caption: "",
      breaking: false,
      featured: false,
      tags: "Editorial, Long-form",
      timestamp: Date.now() - 1000 * 60 * 60 * 24,
      views: 0,
    }, ];
    for (const article of seedData) {
      await insertArticle(article);
    }
    return await loadArticles();
  }

  // Override loadArticles to seed if empty
  const originalLoad = loadArticles;
  loadArticles = async function() {
    const articles = await originalLoad();
    if (articles.length === 0) {
      showToast("No articles found. Seeding with sample data...");
      const seeded = await seedDatabase();
      return seeded;
    }
    return articles;
  };

  // ==========================================================
  // START
  // ==========================================================

  init();
</script>
</body>
</html>
